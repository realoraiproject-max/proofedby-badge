<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ProofedBy — Verify Certification</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --green-deep: #1B4332; --green-mid: #2D6A4F; --green-soft: #52B788;
  --cream: #F8F5EF; --ink: #1A1A18; --muted: #6B6B5E;
  --border: #DDD9CE; --white: #FFFFFF; --error: #C0392B;
}
html, body { min-height: 100vh; background: var(--cream); font-family: 'Outfit', sans-serif; color: var(--ink); }
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image: radial-gradient(circle at 20% 20%, rgba(82,183,136,0.08) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(27,67,50,0.06) 0%, transparent 50%);
}
.page { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; }
.logo-area { text-align: center; margin-bottom: 48px; animation: fadeUp 0.6s ease both; }
.logo-badge { width: 56px; height: 56px; background: var(--green-deep); border-radius: 50%; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; }
.logo-badge svg { width: 28px; height: 28px; }
.logo-title { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--green-deep); letter-spacing: -0.5px; }
.logo-sub { font-size: 13px; color: var(--muted); margin-top: 4px; font-weight: 300; letter-spacing: 0.5px; }
.card { background: var(--white); border: 1px solid var(--border); border-radius: 20px; width: 100%; max-width: 480px; padding: 40px; animation: fadeUp 0.6s ease 0.1s both; }
.card-title { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--ink); margin-bottom: 6px; }
.card-desc { font-size: 14px; color: var(--muted); font-weight: 300; line-height: 1.6; margin-bottom: 28px; }
.field { margin-bottom: 16px; }
label { display: block; font-size: 12px; font-weight: 500; color: var(--muted); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 6px; }
input[type="text"] { width: 100%; padding: 13px 16px; border: 1px solid var(--border); border-radius: 10px; font-family: 'DM Mono', monospace; font-size: 15px; color: var(--ink); background: var(--cream); outline: none; transition: border-color 0.2s, background 0.2s; letter-spacing: 1px; text-transform: uppercase; }
input:focus { border-color: var(--green-soft); background: var(--white); }
.btn { width: 100%; padding: 15px; background: var(--green-deep); color: var(--white); border: none; border-radius: 10px; font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 8px; transition: background 0.2s, transform 0.1s; }
.btn:hover { background: var(--green-mid); }
.btn:active { transform: scale(0.99); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.msg { font-size: 13px; padding: 12px 14px; border-radius: 8px; margin-top: 14px; display: none; line-height: 1.5; }
.msg.error   { background: #FDF2F2; color: var(--error); border: 1px solid #F5C6C6; display: block; }
.msg.loading { background: #F0F7F4; color: var(--green-mid); border: 1px solid #C3E6D8; display: block; }
.result-card { display: none; background: var(--white); border: 1px solid var(--border); border-radius: 20px; width: 100%; max-width: 480px; padding: 40px; animation: fadeUp 0.5s ease both; }
.result-card.show { display: block; }
.badge-header { display: flex; align-items: center; gap: 20px; margin-bottom: 28px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
.badge-img-wrap { position: relative; flex-shrink: 0; }
.badge-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); display: none; }
.badge-img-placeholder { width: 80px; height: 80px; border-radius: 50%; background: var(--cream); border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; }
.badge-img-placeholder svg { width: 32px; height: 32px; }
.verified-dot { position: absolute; bottom: 0; right: 0; width: 24px; height: 24px; background: var(--green-deep); border-radius: 50%; border: 2px solid var(--white); display: flex; align-items: center; justify-content: center; }
.verified-dot svg { width: 11px; height: 11px; }
.badge-info { flex: 1; }
.badge-name { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--ink); margin-bottom: 3px; }
.badge-serial { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 2px; margin-bottom: 4px; }
.badge-vocation { font-size: 13px; color: var(--green-mid); font-weight: 500; }
.section-title { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }
.info-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid var(--border); gap: 12px; }
.info-row:last-child { border-bottom: none; }
.info-label { font-size: 13px; color: var(--muted); flex-shrink: 0; }
.info-value { font-size: 13px; color: var(--ink); font-weight: 500; text-align: right; }
.oath-section { margin-top: 4px; }
.oath-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.oath-item:last-child { border-bottom: none; }
.oath-check { width: 18px; height: 18px; background: var(--green-deep); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
.oath-check svg { width: 9px; height: 9px; }
.oath-text { font-size: 13px; color: var(--ink); line-height: 1.5; }
.divider { height: 1px; background: var(--border); margin: 24px 0; }
.report-section { margin-top: 4px; }
.report-toggle { width: 100%; padding: 11px 16px; background: transparent; border: 1px solid var(--border); border-radius: 10px; font-family: 'Outfit', sans-serif; font-size: 13px; color: var(--muted); cursor: pointer; transition: border-color 0.2s, color 0.2s; text-align: left; display: flex; align-items: center; gap: 8px; }
.report-toggle:hover { border-color: var(--error); color: var(--error); }
.report-toggle svg { width: 14px; height: 14px; flex-shrink: 0; }
.report-form { display: none; margin-top: 14px; }
.report-form.open { display: block; }
.report-form select, .report-form textarea { width: 100%; padding: 11px 14px; border: 1px solid var(--border); border-radius: 10px; font-family: 'Outfit', sans-serif; font-size: 14px; color: var(--ink); background: var(--cream); outline: none; margin-bottom: 10px; transition: border-color 0.2s; }
.report-form select:focus, .report-form textarea:focus { border-color: var(--green-soft); background: var(--white); }
.report-form textarea { resize: vertical; min-height: 90px; }
.report-btn { width: 100%; padding: 12px; background: var(--error); color: var(--white); border: none; border-radius: 10px; font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: opacity 0.2s; }
.report-btn:hover { opacity: 0.85; }
.report-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.report-success { background: #F0F7F4; color: var(--green-mid); border: 1px solid #C3E6D8; border-radius: 10px; padding: 12px 14px; font-size: 13px; text-align: center; display: none; margin-top: 10px; }
.report-success.show { display: block; }
.back-link { display: block; text-align: center; margin-top: 16px; font-size: 13px; color: var(--muted); cursor: pointer; text-decoration: underline; }
.back-link:hover { color: var(--ink); }
.toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--ink); color: var(--white); padding: 10px 20px; border-radius: 100px; font-size: 13px; opacity: 0; transition: opacity 0.3s, transform 0.3s; pointer-events: none; z-index: 100; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
@keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
@media (max-width: 480px) { .card, .result-card { padding: 28px 20px; } .badge-header { flex-direction: column; align-items: flex-start; } }
</style>
</head>
<body>
<div class="page">
  <div class="logo-area">
    <div class="logo-badge">
      <svg viewBox="0 0 28 28" fill="none"><path d="M14 3L17.5 10.5L26 11.5L20 17.5L21.5 26L14 22L6.5 26L8 17.5L2 11.5L10.5 10.5L14 3Z" fill="white" stroke="white" stroke-width="1.5" stroke-linejoin="round"/></svg>
    </div>
    <div class="logo-title">ProofedBy</div>
    <div class="logo-sub">Human Certification Verification</div>
  </div>

  <!-- Search Card -->
  <div class="card" id="search-card">
    <div class="card-title">Verify Certification</div>
    <div class="card-desc">Enter a serial number to view the certification details,<br/>oath statements, and registration date.</div>
    <div class="field">
      <label>Serial Number</label>
      <input type="text" id="input-serial" placeholder="e.g. WR-019" maxlength="20"/>
    </div>
    <button class="btn" id="search-btn" onclick="searchSerial()">Verify</button>
    <div class="msg" id="msg"></div>
  </div>

  <!-- Result Card -->
  <div class="result-card" id="result-card">
    <div class="badge-header">
      <div class="badge-img-wrap">
        <div class="badge-img-placeholder" id="img-placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="#DDD9CE" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        </div>
        <img class="badge-img" id="badge-img" src="" alt=""
          onload="this.style.display='block'; document.getElementById('img-placeholder').style.display='none';"/>
        <div class="verified-dot">
          <svg viewBox="0 0 16 16" fill="none"><path d="M3 8L6.5 11.5L13 5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>
      <div class="badge-info">
        <div class="badge-name" id="res-name"></div>
        <div class="badge-serial" id="res-serial"></div>
        <div class="badge-vocation" id="res-vocation"></div>
      </div>
    </div>

    <div class="section-title">Certification Info</div>
    <div class="info-row">
      <span class="info-label">Registered</span>
      <span class="info-value" id="res-date"></span>
    </div>
    <div class="info-row">
      <span class="info-label">Status</span>
      <span class="info-value" id="res-status"></span>
    </div>

    <div class="divider"></div>

    <div class="section-title">Human Oath</div>
    <div class="oath-section" id="oath-list"></div>

    <div class="divider"></div>

    <div class="report-section">
      <button class="report-toggle" onclick="toggleReport()">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6.5"/><path d="M8 5v3M8 11v.5"/></svg>
        Found an issue with this certification? Report it
      </button>
      <div class="report-form" id="report-form">
        <select id="report-reason">
          <option value="">Select a reason</option>
          <option value="not_human">Suspected to not be a biological human</option>
          <option value="ai_content">Using AI-generated content as human creation</option>
          <option value="impersonation">Impersonating another person</option>
          <option value="false_oath">Violating the terms of the Human Oath</option>
          <option value="other">Other</option>
        </select>
        <textarea id="report-detail" placeholder="Please describe the issue in detail (optional)"></textarea>
        <button class="report-btn" id="report-btn" onclick="submitReport()">Submit Report</button>
        <div class="report-success" id="report-success">Your report has been submitted. We will review it shortly.</div>
      </div>
    </div>

    <span class="back-link" onclick="goBack()">← Search another serial number</span>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbwgQo90eBaTr2hVTkXlkqTxGDJtgychINJHC4FUIXh-0zjVsQU88QtPu3ZlZGLNTsTH/exec";

let currentSerial = "";

async function searchSerial() {
  const serial = document.getElementById("input-serial").value.trim().toUpperCase();
  const btn    = document.getElementById("search-btn");

  if (!serial) { showMsg("Please enter a serial number.", "error"); return; }

  btn.disabled = true;
  showMsg("Looking up certification...", "loading");

  try {
    const url  = `${GAS_URL}?action=verify&serial=${encodeURIComponent(serial)}`;
    const res  = await fetch(url, { method: "GET", redirect: "follow" });
    const text = await res.text();

    if (!text || text.trim().startsWith("<")) {
      showMsg("Server connection failed. Please try again later.", "error");
      btn.disabled = false; return;
    }

    let data;
    try { data = JSON.parse(text); }
    catch (e) {
      showMsg("Response error: " + text.substring(0, 100), "error");
      btn.disabled = false; return;
    }

    if (data.error) {
      showMsg("Error: " + data.error, "error");
      btn.disabled = false; return;
    }

    if (!data.found) {
      showMsg("No certification found for this serial number.<br/>Please double-check and try again.", "error");
      btn.disabled = false; return;
    }

    // ★ 디버그: oath 원본값 콘솔 출력 (확인 후 제거 가능)
    if (data.oathRaw) console.log("Oath raw values:", data.oathRaw);

    showResult(data);

  } catch(e) {
    showMsg("Error: " + e.message, "error");
    btn.disabled = false;
  }
}

function showResult(d) {
  currentSerial = d.serial;

  if (d.imageUrl) {
    document.getElementById("badge-img").src = d.imageUrl;
  }

  document.getElementById("res-name").textContent     = d.name     || "—";
  document.getElementById("res-serial").textContent   = d.serial   || "—";
  document.getElementById("res-vocation").textContent = d.vocation || "—";
  document.getElementById("res-date").textContent     = d.submittedAt || "—";
  document.getElementById("res-status").innerHTML     =
    (d.status || "").toLowerCase() === "verified"
      ? '<span style="color:var(--green-mid)">✓ Verified</span>'
      : `<span style="color:var(--muted)">${d.status || "Pending"}</span>`;

  const oathList = document.getElementById("oath-list");
  oathList.innerHTML = "";
  if (d.oaths && d.oaths.length > 0) {
    d.oaths.forEach(oath => {
      const div = document.createElement("div");
      div.className = "oath-item";
      div.innerHTML = `
        <div class="oath-check">
          <svg viewBox="0 0 16 16" fill="none"><path d="M3 8L6.5 11.5L13 5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="oath-text">${oath}</div>`;
      oathList.appendChild(div);
    });
  } else {
    oathList.innerHTML = '<p style="font-size:13px;color:var(--muted);padding:10px 0;">No oath information available.</p>';
  }

  document.getElementById("report-form").classList.remove("open");
  document.getElementById("report-success").classList.remove("show");
  document.getElementById("report-btn").style.display = "block";
  document.getElementById("report-btn").disabled = false;
  document.getElementById("report-btn").textContent = "Submit Report";
  document.getElementById("report-reason").value = "";
  document.getElementById("report-detail").value = "";

  document.getElementById("search-card").style.display = "none";
  document.getElementById("result-card").classList.add("show");
}

function toggleReport() {
  document.getElementById("report-form").classList.toggle("open");
}

async function submitReport() {
  const reason = document.getElementById("report-reason").value;
  const detail = document.getElementById("report-detail").value.trim();
  const btn    = document.getElementById("report-btn");

  if (!reason) { showToast("Please select a reason."); return; }

  btn.disabled = true;
  btn.textContent = "Submitting...";

  try {
    const url  = `${GAS_URL}?action=report&serial=${encodeURIComponent(currentSerial)}&reason=${encodeURIComponent(reason)}&detail=${encodeURIComponent(detail)}`;
    const res  = await fetch(url, { method: "GET", redirect: "follow" });
    const text = await res.text();
    const data = JSON.parse(text);

    if (data.ok) {
      document.getElementById("report-success").classList.add("show");
      btn.style.display = "none";
    } else {
      showToast("Error: " + (data.error || "Please try again."));
      btn.disabled = false;
      btn.textContent = "Submit Report";
    }
  } catch(e) {
    showToast("Submission failed. Please try again.");
    btn.disabled = false;
    btn.textContent = "Submit Report";
  }
}

function goBack() {
  document.getElementById("result-card").classList.remove("show");
  document.getElementById("search-card").style.display = "block";
  document.getElementById("search-btn").disabled = false;
  document.getElementById("msg").className = "msg";
  document.getElementById("input-serial").value = "";
  currentSerial = "";
}

function showMsg(text, type) {
  const el = document.getElementById("msg");
  el.innerHTML = text;
  el.className = `msg ${type}`;
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

window.addEventListener("DOMContentLoaded", () => {
  // URL 파라미터 자동조회 제거 — 항상 빈 입력창으로 시작
  document.getElementById("input-serial").addEventListener("keydown", e => {
    if (e.key === "Enter") searchSerial();
  });
});
</script>
</body>
</html>
