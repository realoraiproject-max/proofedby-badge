<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>교실 예약 시스템 v9</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root {
  --navy: #0D1B2E;
  --blue: #1A4FA0;
  --blue-l: #3B7DD8;
  --blue-pale: #EBF2FF;
  --green: #0D9E6E;
  --red: #D94040;
  --bg: #F2F5FB;
  --card: #FFFFFF;
  --border: #DDE4EE;
  --text: #1A2535;
  --muted: #5A6A82;
  --light: #9AAABB;
  --sidebar-w: 250px;
}

/* ==================== CARRD IFRAME 핵심 최적화 ==================== */
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    min-height: 100vh;
    font-size: 14px;
    background: var(--bg);
    color: var(--text);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
}

.app {
    display: flex;
    min-height: 100vh;
    height: auto !important;
    overflow: visible !important;
    width: 100%;
}

.sidebar { width: var(--sidebar-w); background: var(--navy); flex-shrink: 0; display: flex; flex-direction: column; overflow-y: auto; }
.main-area { flex: 1; display: flex; flex-direction: column; }
.content { flex: 1; overflow-y: auto; padding: 12px 16px; min-height: 700px; }
.topbar { display: none !important; }

/* 기본 UI 스타일 */
.card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; margin-bottom: 14px; }
.btn { padding: 6px 13px; border-radius: 8px; border: 1.5px solid var(--border); background: var(--card); font-size: 12px; cursor: pointer; font-weight: 500; }
.btn-primary { background: var(--blue); color: #fff; border-color: var(--blue); }
.btn-danger { color: var(--red); border-color: #F5A0A0; }

.overlay { 
    position: fixed; 
    inset: 0; 
    background: rgba(11,27,46,.45); 
    z-index: 2147483647; 
    display: none; 
    align-items: flex-start; 
    justify-content: center; 
    padding-top: 40px;
}
.overlay.open { display: flex; }

.modal, .booking-modal { 
    background: var(--card); 
    border-radius: 12px; 
    max-width: 95vw; 
    max-height: 85vh; 
    overflow-y: auto; 
    box-shadow: 0 20px 60px rgba(0,0,0,.25); 
}

/* Carrd / 좁은 화면 대응 */
@media (max-width: 900px) {
    .app { flex-direction: column; }
    .sidebar { width: 100%; height: auto; }
    .dept-grid, .team-grid { grid-template-columns: 1fr; }
    .modal, .booking-modal { width: 95vw; margin: 10px; }
}

.cal-grid { min-height: 620px !important; }
</style>
</head>
<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sb-brand">
    <h1>🏫 교실 예약 시스템</h1>
    <p>Classroom Reservation</p>
  </div>
  <div class="sb-section">
    <div class="sb-section-label">메뉴</div>
    <button class="nav-btn active" onclick="showPage('calendar')" id="nav-calendar"><span class="ni">📅</span> 캘린더</button>
    <button class="nav-btn" onclick="showPage('teams')" id="nav-teams"><span class="ni">👥</span> 팀 관리</button>
  </div>
  <hr class="sb-divider">
  <div class="sb-section" style="flex:1;overflow-y:auto;">
    <div class="sb-section-label">과 · 팀</div>
    <div id="sidebarTree"></div>
  </div>
  <div class="sb-footer" id="sbDate"></div>
</div>

<!-- MAIN -->
<div class="main-area">
  <div class="content">

    <!-- PAGE: CALENDAR -->
    <div class="page active" id="page-calendar">
      <div class="card" style="display:flex;flex-direction:column;min-height:calc(100vh - 140px);">
        <div class="cal-controls">
          <button class="btn btn-sm" onclick="navCal(-1)">◀</button>
          <span class="cal-title" id="calTitle"></span>
          <button class="btn btn-sm" onclick="navCal(1)">▶</button>
          <button class="btn btn-sm" onclick="goToday()" style="font-size:11px;padding:4px 10px;background:var(--blue-pale);border-color:var(--blue-l);color:var(--blue);font-weight:600;">오늘</button>
          <div class="view-tabs">
            <button class="view-tab" id="vWeek" onclick="setCalView('week')">주간</button>
            <button class="view-tab active" id="vMonth" onclick="setCalView('month')">월간</button>
          </div>
        </div>
        <div class="cal-legend" id="calLegend"></div>
        <div id="calBody" style="flex:1;display:flex;flex-direction:column;"></div>
      </div>
    </div>

    <!-- PAGE: TEAMS -->
    <div class="page" id="page-teams">
      <div class="card">
        <div class="card-title">과 목록</div>
        <div class="dept-grid" id="deptGrid"></div>
      </div>
      <div class="card" id="teamSection">
        <div class="card-title" id="teamSectionTitle">전체 팀 목록 · 교실 · 행사 현황</div>
        <div class="team-grid" id="teamGrid"></div>
        <div id="teamPanelArea" style="margin-top:12px;"></div>
      </div>
    </div>

  </div>
</div>
</div>

<!-- DAY MODAL -->
<div class="overlay" id="dayOverlay" onclick="closeDayModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-head">
      <h3 id="dayTitle">날짜</h3>
      <button class="modal-close" onclick="closeDayModal()">✕</button>
    </div>
    <div class="modal-body" id="dayBody"></div>
  </div>
</div>

<!-- BOOKING MODAL -->
<div class="overlay" id="bkOverlay" onclick="closeBkModal(event)">
  <div class="booking-modal" onclick="event.stopPropagation()">
    <div class="modal-head">
      <h3 id="bkTitle">교실 예약</h3>
      <button class="modal-close" onclick="closeBkModal()">✕</button>
    </div>
    <div class="modal-body" id="bkBody"></div>
  </div>
</div>

<script>
/* ====================== JavaScript ====================== */
let SHEET_API_URL = localStorage.getItem('sheetApiUrl') || '';

async function apiPost(body) {
  if (!SHEET_API_URL) return null;
  try {
    const resp = await fetch(SHEET_API_URL, {
      method: 'POST',
      mode: 'cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    return await resp.json();
  } catch(e) {
    console.error('apiPost error:', e);
    return null;
  }
}

// 나머지 JavaScript 코드는 **원본 reservation.html의 <script> 부분 전체**를 복사해서 여기 붙여넣으세요.
// (renderCalendar, openDayModal, showPage 등 모든 함수 포함)

// INIT
const now = new Date();
document.getElementById('sbDate').textContent = now.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'});
renderSidebarTree();
renderCalendar();
</script>

</body>
</html>
