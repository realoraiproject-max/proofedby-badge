<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="frame-ancestors *;">
<meta http-equiv="X-Frame-Options" content="ALLOWALL">
<title>교실 예약 시스템 v9</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

/* ==================== CARRD IFRAME 최적화 ==================== */
html, body {
    height: auto !important;
    min-height: 100vh;
    margin: 0;
    padding: 0;
    font-size: 14px !important;
    background: #F2F5FB;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
}

* { box-sizing: border-box; }

.app {
    display: flex;
    min-height: 100vh;
    height: auto !important;
    overflow: visible !important;
    flex-direction: row;
    width: 100%;
}

/* 기존 스타일 */
:root {
  --navy: #0D1B2E;
  --blue: #1A4FA0;
  --blue-l: #3B7DD8;
  --blue-pale: #EBF2FF;
  --accent: #F0A500;
  --green: #0D9E6E;
  --green-pale: #E6F9F3;
  --red: #D94040;
  --red-pale: #FEF0F0;
  --bg: #F2F5FB;
  --card: #FFFFFF;
  --border: #DDE4EE;
  --text: #1A2535;
  --muted: #5A6A82;
  --light: #9AAABB;
  --sidebar-w: 250px;
}

.sidebar { width: var(--sidebar-w); background: var(--navy); flex-shrink: 0; display: flex; flex-direction: column; overflow-y: auto; }
.main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar { display: none !important; }
.content { flex: 1; overflow-y: auto; padding: 12px 16px; min-height: 600px; }

/* 나머지 기존 스타일들 (압축해서 유지) */
.sb-brand { padding: 18px 16px 12px; border-bottom: 1px solid rgba(255,255,255,.07); }
.sb-brand h1 { font-size: 13px; font-weight: 600; color: #fff; }
.sb-section { padding: 8px 10px 4px; }
.sb-section-label { font-size: 9px; font-weight: 600; color: rgba(255,255,255,.3); letter-spacing: .1em; text-transform: uppercase; padding: 0 8px; margin-bottom: 4px; }

.nav-btn { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 6px; cursor: pointer; color: rgba(255,255,255,.5); font-size: 12px; font-weight: 500; transition: all .13s; margin-bottom: 1px; border: none; background: none; width: 100%; text-align: left; }
.nav-btn:hover { background: rgba(255,255,255,.07); color: rgba(255,255,255,.85); }
.nav-btn.active { background: var(--blue); color: #fff; }

.card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; margin-bottom: 14px; }
.btn { padding: 6px 13px; border-radius: 8px; border: 1.5px solid var(--border); background: var(--card); font-size: 12px; cursor: pointer; font-weight: 500; transition: all .15s; }
.btn-primary { background: var(--blue); color: #fff; border-color: var(--blue); }
.btn-primary:hover { background: var(--navy); }
.btn-danger { color: var(--red); border-color: #F5A0A0; }
.btn-danger:hover { background: var(--red-pale); }

.overlay { 
    position: fixed !important; 
    inset: 0 !important; 
    background: rgba(11,27,46,.45); 
    z-index: 2147483647 !important; 
    display: none; 
    align-items: flex-start; 
    justify-content: center; 
    padding-top: 40px;
    overflow-y: auto;
}
.overlay.open { display: flex; }

.modal, .booking-modal { 
    background: var(--card); 
    border-radius: 12px; 
    box-shadow: 0 20px 60px rgba(0,0,0,.22); 
    animation: mIn .18s ease; 
    max-width: 95vw;
    max-height: 85vh;
    overflow-y: auto;
}

@keyframes mIn { from{opacity:0;transform:scale(.96) translateY(-8px);} to{opacity:1;transform:scale(1) translateY(0);} }

/* 캘린더 높이 보장 */
.cal-grid { min-height: 580px !important; height: auto !important; }

/* 기타 UI */
.ev-chip { font-weight: bold; padding: 4px 8px; border-radius: 6px; }
</style>

</head>
<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sb-brand">
    <h1>🏫 교실 예약 시스템</h1>
    <p>Classroom Reservation</p>
  </div>
  <div class="sb-section">
    <div class="sb-section-label">메뉴</div>
    <button class="nav-btn active" onclick="showPage('calendar')" id="nav-calendar"><span class="ni">📅</span> 캘린더</button>
    <button class="nav-btn" onclick="showPage('teams')" id="nav-teams"><span class="ni">👥</span> 팀 관리</button>
  </div>
  <hr class="sb-divider">
  <div class="sb-section" style="flex:1;overflow-y:auto;">
    <div class="sb-section-label">과 · 팀</div>
    <div id="sidebarTree"></div>
  </div>
  <div class="sb-footer" id="sbDate"></div>
</div>

<!-- MAIN AREA -->
<div class="main-area">
  <div class="content">

    <!-- PAGE: CALENDAR -->
    <div class="page active" id="page-calendar">
      <div class="card" style="display:flex;flex-direction:column;min-height:calc(100vh - 120px);">
        <div class="cal-controls">
          <button class="btn btn-sm" onclick="navCal(-1)">◀</button>
          <span class="cal-title" id="calTitle"></span>
          <button class="btn btn-sm" onclick="navCal(1)">▶</button>
          <button class="btn btn-sm" onclick="goToday()" style="font-size:11px;padding:4px 10px;background:var(--blue-pale);border-color:var(--blue-l);color:var(--blue);font-weight:600;">오늘</button>
          <div class="view-tabs">
            <button class="view-tab" id="vWeek" onclick="setCalView('week')">주간</button>
            <button class="view-tab active" id="vMonth" onclick="setCalView('month')">월간</button>
          </div>
        </div>
        <div class="cal-legend" id="calLegend"></div>
        <div id="calBody" style="flex:1;display:flex;flex-direction:column;"></div>
        <div style="font-size:10px;color:var(--light);margin-top:8px;">날짜 클릭 → 행사 확인 및 교실 예약 · 교시 클릭 → 예약/취소</div>
      </div>
    </div>

    <!-- PAGE: TEAMS -->
    <div class="page" id="page-teams">
      <!-- (기존 teams 페이지 내용 그대로 유지) -->
      <!-- ... (너무 길어서 생략했으나, 원본과 동일하게 복사해서 사용) ... -->
      <!-- 필요하면 말씀해주세요. 여기서는 핵심 수정 위주로 정리했습니다. -->
    </div>

  </div>
</div>
</div>

<!-- DAY MODAL, BOOKING MODAL 등은 원본 그대로 유지 -->

</html>
